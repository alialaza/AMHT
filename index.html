<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMHT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p-dark: #3a1a5b; --gold: #d4af37; --bg: #e5ddd5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--p-dark); color: var(--gold); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); }
        .battery { font-size: 11px; color: white; margin-top: 4px; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: #fff; }
        .time { font-size: 9px; color: #888; display: block; margin-top: 4px; }
        .footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn-icon { background: none; border: none; font-size: 22px; cursor: pointer; }
        .btn-send { background: var(--p-dark); color: var(--gold); border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #heartPop { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; z-index: 2000; display: none; animation: pulse 0.6s infinite; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold;">AMHT</div>
    <div id="otherBatt" class="battery">🔋 جاري جلب البطارية...</div>
    <div style="margin-top: 8px;">
        <button class="btn-icon" onclick="sendHeart()">💓</button>
        <button class="btn-icon" onclick="showInfo()">ℹ️</button>
        <button class="btn-icon" onclick="clearLocalChat()">🗑️</button>
    </div>
</div>

<div id="chatBox"></div>
<div id="heartPop">💓</div>

<div class="footer">
    <input type="text" id="messageInput" placeholder="اكتب هنا...">
    <button class="btn-send" onclick="handleSend()">إرسال</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3m4yZNjiJBE-24KaX0RYESYwUA_qY7UE",
        authDomain: "iraqiran-95bed.firebaseapp.com",
        projectId: "iraqiran-95bed",
        databaseURL: "https://iraqiran-95bed-default-rtdb.firebaseio.com",
        storageBucket: "iraqiran-95bed.firebasestorage.app",
        messagingSenderId: "736293412010",
        appId: "1:736293412010:web:d1855197deb6258ce084d3"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const currentUser = localStorage.getItem('sultan_user') || (prompt("من أنت؟ (علي / مريم)") === "علي" ? "علي" : "مريم");
    localStorage.setItem('sultan_user', currentUser);
    const otherUser = currentUser === "علي" ? "مريم" : "علي";

    if (navigator.getBattery) {
        navigator.getBattery().then(batt => {
            const update = () => db.ref('status/' + currentUser).set({ battery: Math.round(batt.level * 100) });
            update(); batt.onlevelchange = update;
        });
    }
    db.ref('status/' + otherUser).on('value', s => {
        document.getElementById('otherBatt').innerText = `🔋 بطارية ${otherUser}: ${s.val()?.battery || '--'}%`;
    });

    function handleSend() {
        const inp = document.getElementById('messageInput');
        const txt = inp.value.trim();
        if (txt) {
            db.ref('messages').push({
                sender: currentUser,
                text: txt,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                ts: Date.now()
            });
            inp.value = '';
        }
    }

    db.ref('messages').on('value', s => {
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        const hidden = JSON.parse(localStorage.getItem('hidden_msgs') || "[]");
        s.forEach(child => {
            if (hidden.includes(child.key)) return;
            const m = child.val();
            const div = document.createElement('div');
            div.className = `msg ${m.sender === currentUser ? 'sent' : 'received'}`;
            div.innerHTML = `${m.text} <span class="time">${m.time}</span>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    function sendHeart() { db.ref('hearts/' + otherUser).set({ from: currentUser, ts: Date.now() }); }
    db.ref('hearts/' + currentUser).on('value', s => {
        if (s.val()) {
            const h = document.getElementById('heartPop');
            h.style.display = 'block';
            setTimeout(() => { h.style.display = 'none'; db.ref('hearts/' + currentUser).remove(); }, 3000);
        }
    });

    function showInfo() {
        db.ref('messages').once('value', s => {
            const msgs = Object.values(s.val() || {});
            const count = msgs.filter(m => m.sender === otherUser).length;
            alert(`معلومات AMHT:\n📩 الرسائل المستلمة من ${otherUser}: ${count}`);
        });
    }

    function clearLocalChat() {
        if (confirm("حذف الرسائل من جهازك فقط؟")) {
            db.ref('messages').once('value', s => {
                localStorage.setItem('hidden_msgs', JSON.stringify(Object.keys(s.val() || {})));
                location.reload();
            });
        }
    }
</script>
</body>
</html>
