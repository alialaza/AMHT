<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMHT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --sultan-purple-dark: #3a1a5b; 
            --sultan-gold: #d4af37; 
            --bg: #f0f2f5; 
        }

        /* ضبط الحجم ليكون متناسقاً 100% مع شاشة الموبايل */
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* الهيدر */
        .header {
            background: var(--sultan-purple-dark);
            color: var(--sultan-gold);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--sultan-gold);
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .battery-text { font-size: 12px; color: #fff; margin-top: 5px; }

        /* منطقة الشات */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #e5ddd5; /* لون خلفية يشبه الواتساب */
        }

        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            font-size: 16px;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-left-radius: 2px; }
        .received { align-self: flex-start; background: #ffffff; border-bottom-right-radius: 2px; }

        /* منطقة الإدخال وزر الإرسال (تم تثبيتها لضمان عدم الاختفاء) */
        .footer {
            background: #f0f0f0;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }

        input#messageInput {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
        }

        .send-btn {
            background: var(--sultan-purple-dark);
            color: var(--sultan-gold);
            border: none;
            padding: 12px 20px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div style="font-weight: bold; font-size: 20px;">AMHT</div>
        <div id="otherBatt" class="battery-text">🔋 جاري فحص بطارية الطرف الآخر...</div>
        <div style="margin-top: 10px;">
            <button onclick="sendHeart()" style="background:none; border:none; font-size:25px; cursor:pointer;">💓</button>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="footer">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا...">
        <button class="send-btn" onclick="handleSend()">🚀</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3m4yZNjiJBE-24KaX0RYESYwUA_qY7UE",
        authDomain: "iraqiran-95bed.firebaseapp.com",
        projectId: "iraqiran-95bed",
        databaseURL: "https://iraqiran-95bed-default-rtdb.firebaseio.com",
        storageBucket: "iraqiran-95bed.firebasestorage.app",
        messagingSenderId: "736293412010",
        appId: "1:736293412010:web:d1855197deb6258ce084d3"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // مسح الرسائل القديمة عند التشغيل الأول لضمان "حذف أي شيء مكتوب سابقاً"
    // ملاحظة: يمكنك حذف هذا السطر بعد أول تشغيل إذا أردت حفظ الرسائل لاحقاً
    db.ref('messages').remove(); 

    let user = localStorage.getItem('chat_user') || (prompt("من أنت؟ (علي / مريم)") === "علي" ? "علي" : "مريم");
    localStorage.setItem('chat_user', user);
    const other = user === "علي" ? "مريم" : "علي";

    // تحديث حالة البطارية
    if (navigator.getBattery) {
        navigator.getBattery().then(batt => {
            const update = () => db.ref('status/' + user).set({ level: Math.round(batt.level * 100) });
            update();
            batt.onlevelchange = update;
        });
    }
    db.ref('status/' + other).on('value', s => {
        document.getElementById('otherBatt').innerText = `🔋 بطارية ${other}: ${s.val()?.level || '--'}%`;
    });

    // إرسال الرسائل
    function handleSend() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (text) {
            db.ref('messages').push({
                sender: user,
                text: text,
                ts: Date.now()
            });
            input.value = '';
        }
    }

    // عرض الرسائل وتثبيت السكرول لأسفل
    db.ref('messages').on('value', s => {
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        s.forEach(child => {
            const m = child.val();
            const div = document.createElement('div');
            div.className = `msg ${m.sender === user ? 'sent' : 'received'}`;
            div.innerText = m.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    // ميزة النبض
    function sendHeart() { db.ref('hearts/' + other).set({ from: user, ts: Date.now() }); }
    db.ref('hearts/' + user).on('value', s => {
        if (s.val()) {
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            alert("💓 وصلتك نبضة قلب من " + other);
            db.ref('hearts/' + user).remove();
        }
    });

    // معالجة الضغط على Enter لإرسال الرسالة
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>
</body>
</html>
