<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMHT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --sultan-purple-dark: #3a1a5b; 
            --sultan-gold: #d4af37; 
            --soft-grey: #f0f2f5; 
        }
        
        /* جعل الحجم يملأ شاشة الهاتف تماماً */
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background: var(--soft-grey); }
        .main-container { display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: var(--sultan-purple-dark); color: var(--sultan-gold); padding: 12px; text-align: center; border-bottom: 2px solid var(--sultan-gold); flex-shrink: 0; }
        .battery-info { font-size: 11px; color: white; margin-top: 4px; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .sent { align-self: flex-end; background: #dcf8c6; color: #000; border-bottom-left-radius: 2px; }
        .received { align-self: flex-start; background: #fff; color: #000; border-bottom-right-radius: 2px; }

        .footer { background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; flex-shrink: 0; }
        input { flex: 1; border: 1px solid #ccc; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        .btn-send { background: var(--sultan-purple-dark); color: var(--sultan-gold); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div style="font-weight: bold; font-size: 18px;">AMHT</div>
        <div id="otherBatt" class="battery-info">🔋 جاري جلب البطارية...</div>
        <div style="margin-top: 10px;">
            <button onclick="sendHeart()" style="background:none; border:none; font-size:22px; cursor:pointer;">💓</button>
            <button onclick="clearChat()" style="background:none; border:none; font-size:22px; cursor:pointer;">🗑️</button>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="footer">
        <input type="text" id="messageInput" placeholder="اكتب هنا يا علي...">
        <button class="btn-send" onclick="handleSend()">إرسال</button>
    </div>
</div>

<script>
    // طلب إذن الإشعارات فور فتح التطبيق
    if ("Notification" in window) {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") console.log("تم تفعيل الإشعارات");
        });
    }

    const firebaseConfig = {
        apiKey: "AIzaSyC3m4yZNjiJBE-24KaX0RYESYwUA_qY7UE",
        authDomain: "iraqiran-95bed.firebaseapp.com",
        projectId: "iraqiran-95bed",
        databaseURL: "https://iraqiran-95bed-default-rtdb.firebaseio.com",
        storageBucket: "iraqiran-95bed.firebasestorage.app",
        messagingSenderId: "736293412010",
        appId: "1:736293412010:web:d1855197deb6258ce084d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let user = localStorage.getItem('amht_user') || (prompt("من أنت؟ (علي / مريم)") === "علي" ? "علي" : "مريم");
    localStorage.setItem('amht_user', user);
    const other = user === "علي" ? "مريم" : "علي";

    // تحديث البطارية
    if (navigator.getBattery) {
        navigator.getBattery().then(batt => {
            const up = () => db.ref('status/' + user).set({ battery: Math.round(batt.level * 100) });
            up(); batt.onlevelchange = up;
        });
    }
    db.ref('status/' + other).on('value', s => {
        document.getElementById('otherBatt').innerText = `🔋 بطارية ${other}: ${s.val()?.battery || '--'}%`;
    });

    // إرسال رسالة مع إشعار
    function handleSend() {
        const txt = document.getElementById('messageInput').value.trim();
        if (txt) {
            db.ref('messages').push({ sender: user, text: txt, ts: Date.now() });
            document.getElementById('messageInput').value = '';
        }
    }

    // عرض الرسائل وتناسقها
    db.ref('messages').limitToLast(20).on('value', s => {
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        s.forEach(child => {
            const m = child.val();
            const div = document.createElement('div');
            div.className = `msg ${m.sender === user ? 'sent' : 'received'}`;
            div.innerText = m.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    // ميزة النبض مع اهتزاز وإشعار
    function sendHeart() { db.ref('hearts/' + other).set({ from: user, ts: Date.now() }); }
    db.ref('hearts/' + user).on('value', s => {
        if (s.val()) {
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            new Notification("AMHT 💓", { body: `أرسل لك ${other} نبضة قلب!` });
            db.ref('hearts/' + user).remove();
        }
    });

    function clearChat() { if(confirm("حذف الكل؟")) db.ref('messages').remove(); }
</script>
</body>
</html>
